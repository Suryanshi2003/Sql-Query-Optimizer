<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta

            name="description"

            content="SQL Query Optimizer - AI-powered query optimization using Groq API"

    />

    <meta name="theme-color" content="#3b82f6" />

    <title>SQL Query Optimizer - AI-powered Query Analysis</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <style>

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }



        html, body {

            width: 100%;

            height: 100%;

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',

            'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',

            'Helvetica Neue', sans-serif;

            -webkit-font-smoothing: antialiased;

            -moz-osx-font-smoothing: grayscale;

            background: #f9fafb;

            color: #1f2937;

            line-height: 1.6;

        }



        app-root {

            display: block;

            width: 100%;

            height: 100%;

        }



        /* Loading spinner while Angular bootstraps */

        .loading-container {

            display: flex;

            align-items: center;

            justify-content: center;

            width: 100%;

            height: 100vh;

            background: #f9fafb;

        }



        .spinner {

            border: 4px solid #e5e7eb;

            border-top: 4px solid #3b82f6;

            border-radius: 50%;

            width: 40px;

            height: 40px;

            animation: spin 1s linear infinite;

        }



        @keyframes spin {

            0% { transform: rotate(0deg); }

            100% { transform: rotate(360deg); }

        }

    </style>

</head>

<body>

<app-root></app-root>



<!-- Fallback loading message while Angular initializes -->

<noscript>

    <p>

        JavaScript is required to run this application. Please enable JavaScript in your browser settings.

    </p>

</noscript>

</body>

</html>
